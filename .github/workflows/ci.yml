name: CI — build & checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Syntax check
        run: npm run lint

      - name: Audit dependencies (high severity only)
        run: npm audit --audit-level=high || true

  static-site:
    name: Static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken relative links in HTML
        run: |
          shopt -s nullglob
          for f in *.html posts/*.html; do
            echo "Checking $f"
            grep -o 'href="[^"]*"' "$f" || true
          done

      - name: Validate JSON/manifest files exist
        run: |
          test -f CNAME && echo "CNAME present"
          test -f robots.txt && echo "robots.txt present"
          test -f sitemap.xml && echo "sitemap.xml present"
