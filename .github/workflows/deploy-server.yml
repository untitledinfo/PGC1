name: Deploy server

# This only does something once you add a DEPLOY_HOOK_URL secret in
# GitHub → Settings → Secrets and variables → Actions.
# Get that URL from your host (e.g. Render → Settings → Deploy Hook).
# Until then this workflow runs but safely no-ops.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "No DEPLOY_HOOK_URL secret set yet — skipping. See server/README.md."
            exit 0
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK_URL"
